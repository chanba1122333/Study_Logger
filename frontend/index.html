<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Study Logger</title>
    <link rel="stylesheet" href="./src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <h1>Study Logger</h1>
            <div class="add-task-container">
                <input type="text" id="new-task-input" placeholder="What are you studying today?" autocomplete="off">
                <button id="add-task-btn">+</button>
            </div>
        </header>

        <main id="tasks-container">
            <!-- Task cards will be injected here by JS -->
        </main>

        <footer>
            <div id="repo-setup-container" class="repo-setup">
                <div class="repo-header">
                    <span id="current-repo-text" class="text-secondary">Checking GitHub linking...</span>
                    <button id="edit-repo-btn" class="text-btn">Edit</button>
                </div>
                <div id="repo-edit-form" style="display: none;">
                    <input type="text" id="repo-url-input" placeholder="https://github.com/User/Repo.git">
                    <button id="save-repo-btn">Link</button>
                </div>
            </div>

            <button id="commit-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                    <path d="M9 18c-4.51 2-5-2-7-2"></path>
                </svg>
                Committing to GitHub
            </button>
        </footer>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Delete Task</h3>
            <p>Are you sure you want to delete this task? Time tracked will be lost.</p>
            <div class="modal-checkbox">
                <input type="checkbox" id="dont-ask-delete">
                <label for="dont-ask-delete">Don't ask me again</label>
            </div>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="control-btn" style="background: var(--border-color); color: var(--text-primary);">Cancel</button>
                <button id="confirm-delete-btn" class="control-btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Commit Result Modal -->
    <div id="commit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="commit-modal-title">Commit Result</h3>
            <p id="commit-modal-msg" style="word-break: break-all; max-height: 200px; overflow-y: auto;"></p>
            <div class="modal-actions">
                <button id="commit-cancel-btn" class="control-btn" style="background: var(--border-color); color: var(--text-primary); display: none;">Close</button>
                <button id="commit-retry-btn" class="control-btn btn-start" style="display: none;">Try Again</button>
                <button id="commit-ok-btn" class="control-btn btn-start">OK</button>
            </div>
        </div>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
